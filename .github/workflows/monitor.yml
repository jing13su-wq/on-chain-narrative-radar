name: On-chain narrative monitor

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Scan without sending Telegram messages"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      reset_state:
        description: "Ignore cached alert state for this run"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: .cache
          key: monitor-state-${{ github.run_id }}
          restore-keys: |
            monitor-state-

      - name: Prepare state directory
        run: mkdir -p .cache

      - name: Validate Telegram secrets
        run: |
          test -n "${TELEGRAM_BOT_TOKEN}" || (echo "Missing TELEGRAM_BOT_TOKEN secret" && exit 1)
          test -n "${TELEGRAM_CHAT_ID}" || (echo "Missing TELEGRAM_CHAT_ID secret" && exit 1)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          RESET_STATE: ${{ github.event.inputs.reset_state || 'false' }}
        run: |
          EXTRA_ARGS=""
          if [ "${DRY_RUN}" = "true" ]; then
            EXTRA_ARGS="--dry-run"
          fi
          if [ "${RESET_STATE}" = "true" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --reset-state"
          fi
          python monitor.py --once ${EXTRA_ARGS} --min-score 55 --min-liquidity 25000 --min-volume 50000 --max-alerts 5 --state-file .cache/monitor_state.json
