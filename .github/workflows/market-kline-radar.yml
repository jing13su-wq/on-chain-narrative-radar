name: Market kline radar

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render charts without sending Telegram messages"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      reset_state:
        description: "Ignore cached rank and dedupe state for this run"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      bootstrap_volume_alerts:
        description: "Alert current volume leaders even when no previous leaderboard exists"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      interval:
        description: "Kline interval"
        required: true
        default: "15m"
        type: choice
        options:
          - "5m"
          - "15m"
          - "1h"
      chart_limit:
        description: "Candles per chart"
        required: true
        default: "180"
        type: choice
        options:
          - "120"
          - "180"
          - "240"
      test_symbol:
        description: "Optional: send one chart for this symbol, bypassing filters"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: market_kline_radar/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r market_kline_radar/requirements.txt

      - name: Restore radar state
        uses: actions/cache@v4
        with:
          path: .cache
          key: market-kline-radar-state-${{ github.run_id }}
          restore-keys: |
            market-kline-radar-state-

      - name: Prepare runtime directories
        run: mkdir -p .cache "$RUNNER_TEMP/market_kline_radar_charts"

      - name: Validate Telegram secrets
        if: ${{ (github.event.inputs.dry_run || 'false') != 'true' }}
        run: |
          test -n "${TELEGRAM_BOT_TOKEN}" || (echo "Missing TELEGRAM_BOT_TOKEN secret" && exit 1)
          test -n "${TELEGRAM_CHAT_ID}" || (echo "Missing TELEGRAM_CHAT_ID secret" && exit 1)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run market kline radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          RESET_STATE: ${{ github.event.inputs.reset_state || 'false' }}
          BOOTSTRAP_VOLUME_ALERTS: ${{ github.event.inputs.bootstrap_volume_alerts || 'false' }}
          INTERVAL: ${{ github.event.inputs.interval || '15m' }}
          CHART_LIMIT: ${{ github.event.inputs.chart_limit || '180' }}
          TEST_SYMBOL: ${{ github.event.inputs.test_symbol || '' }}
        run: |
          EXTRA_ARGS=()
          if [ "${DRY_RUN}" = "true" ]; then
            EXTRA_ARGS+=(--dry-run)
          fi
          if [ "${RESET_STATE}" = "true" ]; then
            EXTRA_ARGS+=(--reset-state)
          fi
          if [ "${BOOTSTRAP_VOLUME_ALERTS}" = "true" ]; then
            EXTRA_ARGS+=(--bootstrap-volume-alerts)
          fi
          if [ -n "${TEST_SYMBOL}" ]; then
            EXTRA_ARGS+=(--test-symbol "${TEST_SYMBOL}")
          fi
          python market_kline_radar/scanner.py --once "${EXTRA_ARGS[@]}" \
            --interval "${INTERVAL}" \
            --chart-limit "${CHART_LIMIT}" \
            --candle-width-scale 0.48 \
            --volume-top-n 40 \
            --gainer-top-n 25 \
            --min-volume-quote 50000000 \
            --min-gainer-volume-quote 20000000 \
            --min-gain-pct 12 \
            --seen-ttl-hours 6 \
            --max-alerts 8 \
            --state-file .cache/market_kline_radar_state.json \
            --chart-dir "$RUNNER_TEMP/market_kline_radar_charts"
